data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  splits_dir: "data/splits"

classes:
  0: cow
  1: pig
  2: goat
  3: sheep
  4: horse
  5: other

training:
  detection:
    model: "yolov8m.pt"
    epochs: 100
    patience: 15
    imgsz: 640
  segmentation:
    encoder: "resnet34"
    epochs: 80
    batch_size: 16
    learning_rate: 0.001
  regression:
    cnn_model: "efficientnet-b0"
    cnn_epochs: 60
    learning_rate: 0.001

paths:
  checkpoints: "checkpoints"
  runs: "runs"
  logs: "logs"
  outputs: "outputs"
